name: Deploy to Staging

on:
  push:
    branches: [ develop ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: develop

      - name: Deploy to staging server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          envs: STAGING_PORT
          timeout: 30m
          script: |
            export STAGING_PORT="${{ vars.STAGING_PORT }}"
            cd /app/aigc-for-study

            git pull origin develop

            docker-compose -f docker-compose.yml -f docker-compose.staging.yml up -d --build

            sleep 10
            curl -f http://localhost:$STAGING_PORT/health || echo "Health check endpoint not available"

            echo "Deployment to staging completed on port $STAGING_PORT!"

      - name: Run API tests on staging
        run: |
          echo "等待服务启动..."
          sleep 15
          echo "运行API测试..."
          if [ -f backend/tests/api_test.py ]; then
            pip install httpx
            python backend/tests/api_test.py --base-url http://${{ secrets.STAGING_HOST }}:${{ vars.STAGING_PORT }} --api-key "${{ secrets.DEEPSEEK_API_KEY }}" || echo "API tests completed with some failures"
          fi

      - name: Notify deployment status
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✓ Deployment to staging succeeded"
          else
            echo "✗ Deployment to staging failed"
          fi
