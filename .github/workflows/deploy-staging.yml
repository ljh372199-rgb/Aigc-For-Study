name: Deploy to Staging

on:
  push:
    branches: [ develop ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: develop

      - name: Deploy to staging server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          envs: STAGING_PORT
          script: |
            export STAGING_PORT="${{ vars.STAGING_PORT }}"
            cd /app/aigc-for-study

            # 创建测试环境配置文件
            cat > .env.staging << EOF
            APP_PORT=$STAGING_PORT
            APP_ENV=staging
            DEBUG=false
            
            # 数据库配置
            DATABASE_URL=postgresql://${{ secrets.STAGING_DB_USER }}:${{ secrets.STAGING_DB_PASSWORD }}@localhost:5432/aigc_staging
            
            # Redis配置
            REDIS_URL=redis://localhost:6379/0
            
            # JWT配置
            JWT_SECRET_KEY=${{ secrets.STAGING_JWT_SECRET }}
            JWT_ALGORITHM=HS256
            JWT_ACCESS_TOKEN_EXPIRE_MINUTES=60
            JWT_REFRESH_TOKEN_EXPIRE_DAYS=7
            
            # DeepSeek AI配置
            AI_PROVIDER=deepseek
            DEEPSEEK_API_KEY=${{ secrets.DEEPSEEK_API_KEY }}
            DEEPSEEK_MODEL=deepseek-chat
            DEEPSEEK_BASE_URL=https://api.deepseek.com
            
            # CORS配置
            CORS_ORIGINS=["https://staging.aigcstudy.com"]
            
            # 日志配置
            LOG_LEVEL=INFO
            LOG_FORMAT=json
            EOF

            # 拉取最新代码
            git pull origin develop

            # 构建并启动服务
            docker-compose -f docker-compose.yml -f docker-compose.staging.yml build --no-cache api 2>/dev/null || true
            docker-compose -f docker-compose.yml -f docker-compose.staging.yml up -d 2>/dev/null || echo "Docker compose not configured, skipping..."

            # 健康检查
            sleep 10
            curl -f http://localhost:$STAGING_PORT/health || echo "Health check endpoint not available"

            echo "Deployment to staging completed on port $STAGING_PORT!"

      - name: Run API tests on staging
        run: |
          echo "等待服务启动..."
          sleep 15
          echo "运行API测试..."
          if [ -f backend/tests/api_test.py ]; then
            pip install httpx
            python backend/tests/api_test.py --base-url http://${{ secrets.STAGING_HOST }}:${{ vars.STAGING_PORT }} --api-key "${{ secrets.DEEPSEEK_API_KEY }}" || echo "API tests completed with some failures"
          fi

      - name: Notify deployment status
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✓ Deployment to staging succeeded"
          else
            echo "✗ Deployment to staging failed"
          fi
