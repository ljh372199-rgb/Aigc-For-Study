name: Deploy to Staging

on:
  push:
    branches: [ develop ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: develop

      - name: Deploy to staging server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          envs: STAGING_PORT
          script: |
            export STAGING_PORT="${{ vars.STAGING_PORT }}"
            cd /app/aigc-for-study

            # 创建测试环境配置文件
            cat > .env.staging << EOF
            APP_PORT=$STAGING_PORT
            APP_ENV=staging
            EOF

            # 拉取最新代码
            git pull origin develop

            # 拉取最新镜像
            docker-compose -f docker-compose.yml -f docker-compose.staging.yml pull 2>/dev/null || true

            # 使用测试环境配置启动服务
            docker-compose -f docker-compose.yml -f docker-compose.staging.yml up -d 2>/dev/null || echo "Docker compose not configured, skipping..."

            # 健康检查
            sleep 10
            curl -f http://localhost:$STAGING_PORT/health || curl -f http://localhost:$STAGING_PORT || echo "Health check endpoint not available"

            echo "Deployment to staging completed on port $STAGING_PORT!"

      - name: Notify deployment status
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✓ Deployment to staging succeeded"
          else
            echo "✗ Deployment to staging failed"
          fi
