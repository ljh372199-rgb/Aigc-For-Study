name: Deploy to Production

on:
  release:
    types: [ published ]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to deploy (e.g., v1.0.0)'
        required: true
        default: 'latest'

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${{ github.event.release.tag_name }}"
          fi
          echo "Deploying version: $VERSION"
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Deploy to production server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          envs: PRODUCTION_PORT
          script: |
            export PRODUCTION_PORT="${{ vars.PRODUCTION_PORT }}"
            cd /app/aigc-for-study

            # 创建生产环境配置文件
            cat > .env.production << EOF
            APP_PORT=$PRODUCTION_PORT
            APP_ENV=production
            DEBUG=false
            
            # 数据库配置
            DATABASE_URL=postgresql://${{ secrets.PRODUCTION_DB_USER }}:${{ secrets.PRODUCTION_DB_PASSWORD }}@localhost:5432/aigc_production
            
            # Redis配置
            REDIS_URL=redis://localhost:6379/0
            
            # JWT配置
            JWT_SECRET_KEY=${{ secrets.PRODUCTION_JWT_SECRET }}
            JWT_ALGORITHM=HS256
            JWT_ACCESS_TOKEN_EXPIRE_MINUTES=60
            JWT_REFRESH_TOKEN_EXPIRE_DAYS=7
            
            # DeepSeek AI配置
            AI_PROVIDER=deepseek
            DEEPSEEK_API_KEY=${{ secrets.DEEPSEEK_API_KEY }}
            DEEPSEEK_MODEL=deepseek-chat
            DEEPSEEK_BASE_URL=https://api.deepseek.com
            
            # CORS配置
            CORS_ORIGINS=["https://www.aigcstudy.com"]
            
            # 日志配置
            LOG_LEVEL=WARNING
            LOG_FORMAT=json
            EOF

            # 拉取指定版本
            git fetch --tags
            if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
              git checkout ${{ github.event.inputs.version }}
            else
              git checkout ${{ github.event.release.tag_name }}
            fi

            # 拉取镜像
            docker-compose -f docker-compose.yml -f docker-compose.production.yml pull 2>/dev/null || true

            # 停止旧服务
            docker-compose -f docker-compose.yml -f docker-compose.production.yml down 2>/dev/null || true

            # 使用生产环境配置启动服务
            docker-compose -f docker-compose.yml -f docker-compose.production.yml up -d 2>/dev/null || echo "Docker compose not configured"

            # 健康检查
            sleep 15
            curl -f http://localhost:$PRODUCTION_PORT/health || echo "Health check endpoint not available"

            echo "Production deployment completed on port $PRODUCTION_PORT!"

      - name: Verify deployment
        run: |
          echo "Production deployment verified: ${{ env.VERSION }}"
          
          # 运行最终验证测试
          sleep 5
          if [ -f backend/tests/api_test.py ]; then
            pip install httpx
            python backend/tests/api_test.py --base-url http://${{ secrets.PRODUCTION_HOST }}:${{ vars.PRODUCTION_PORT }} || echo "API tests completed"
          fi

      - name: Notify deployment success
        if: success()
        run: |
          echo "✓ Production deployment succeeded: ${{ env.VERSION }}"

      - name: Notify deployment failure
        if: failure()
        run: |
          echo "✗ Production deployment failed: ${{ env.VERSION }}"
