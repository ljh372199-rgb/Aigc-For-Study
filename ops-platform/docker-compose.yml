services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aigc-ops-frontend
    ports:
      - "3000:80"
    environment:
      - VITE_API_URL=http://localhost:3000/api/v1
    depends_on:
      - backend
    networks:
      - ops-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aigc-ops-backend
    ports:
      - "38000:8000"
    environment:
      - PROMETHEUS_URL=http://prometheus:9090
      - LOKI_URL=http://loki:3100
      - ALERTMANAGER_URL=http://alertmanager:9093
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/ops
      - REDIS_URL=redis://redis:6379
    depends_on:
      - db
      - redis
    networks:
      - ops-network

  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: aigc-ops-prometheus
    ports:
      - "29090:9090"
    volumes:
      - ./ops/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./ops/prometheus/alert_rules:/etc/prometheus/alert_rules
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    networks:
      - ops-network

  grafana:
    image: grafana/grafana:10.2.0
    container_name: aigc-ops-grafana
    ports:
      - "23000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./ops/grafana/provisioning:/etc/grafana/provisioning
      - ./ops/grafana/dashboards:/var/lib/grafana/dashboards
      - grafana_data:/var/lib/grafana
    networks:
      - ops-network

  alertmanager:
    image: prom/alertmanager:v0.26.0
    container_name: aigc-ops-alertmanager
    ports:
      - "29093:9093"
    volumes:
      - ./ops/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml
      - alertmanager_data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    networks:
      - ops-network

  loki:
    image: grafana/loki:2.9.0
    container_name: aigc-ops-loki
    ports:
      - "3100:3100"
    volumes:
      - ./ops/loki/loki.yml:/etc/loki/local-config.yaml
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - ops-network

  promtail:
    image: grafana/promtail:2.9.0
    container_name: aigc-ops-promtail
    volumes:
      - ./ops/promtail/promtail.yml:/etc/promtail/config.yml
      - /var/log:/var/log
    command: -config.file=/etc/promtail/config.yml
    networks:
      - ops-network

  db:
    image: postgres:15-alpine
    container_name: aigc-ops-db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=ops
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks:
      - ops-network

  redis:
    image: redis:7-alpine
    container_name: aigc-ops-redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    networks:
      - ops-network

volumes:
  prometheus_data:
  grafana_data:
  alertmanager_data:
  loki_data:
  postgres_data:
  redis_data:

networks:
  ops-network:
    driver: bridge
