version: '3.8'

services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aigc-api-staging
    restart: unless-stopped
    ports:
      - "38000:8000"
    environment:
      - APP_ENV=staging
      - APP_PORT=38000
      - DATABASE_URL=${DATABASE_URL:-postgresql://aigc:aigc@db:5432/aigc_staging}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - AI_PROVIDER=${AI_PROVIDER:-deepseek}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - DEEPSEEK_MODEL=${DEEPSEEK_MODEL:-deepseek-chat}
      - DEEPSEEK_BASE_URL=${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - CLAUDE_API_KEY=${CLAUDE_API_KEY}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
    volumes:
      - uploads_staging:/app/uploads
    depends_on:
      - db
      - redis
    networks:
      - aigc-network

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: aigc-web-staging
    restart: unless-stopped
    ports:
      - "38010:80"
    environment:
      - VITE_API_BASE_URL=http://124.223.78.206:38000/api/v1
      - VITE_APP_ENV=staging
    volumes:
      - uploads_staging:/app/uploads
    depends_on:
      - api
    networks:
      - aigc-network

  db:
    image: postgres:15-alpine
    container_name: aigc-db-staging
    restart: unless-stopped
    environment:
      - POSTGRES_USER=aigc
      - POSTGRES_PASSWORD=aigc
      - POSTGRES_DB=aigc_staging
    volumes:
      - postgres_data_staging:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks:
      - aigc-network

  redis:
    image: redis:7-alpine
    container_name: aigc-redis-staging
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis_data_staging:/data
    networks:
      - aigc-network

volumes:
  postgres_data_staging:
  redis_data_staging:
  uploads_staging:

networks:
  aigc-network:
    driver: bridge
