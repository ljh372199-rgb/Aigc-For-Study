version: '3.8'

services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: ghcr.io/ljh372199-rgb/aigc-for-study:latest
    container_name: aigc-api
    restart: unless-stopped
    ports:
      - "38000:38000"
    environment:
      - APP_ENV=${APP_ENV:-development}
      - DEBUG=${DEBUG:-true}
      - DATABASE_URL=${DATABASE_URL:-postgresql://aigc:aigc@db:5432/aigc_dev}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-jwt-secret-key-change-in-production}
      - JWT_ALGORITHM=HS256
      - JWT_ACCESS_TOKEN_EXPIRE_MINUTES=60
      - JWT_REFRESH_TOKEN_EXPIRE_DAYS=7
      - AI_PROVIDER=${AI_PROVIDER:-deepseek}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - DEEPSEEK_MODEL=${DEEPSEEK_MODEL:-deepseek-chat}
      - DEEPSEEK_BASE_URL=${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - CLAUDE_API_KEY=${CLAUDE_API_KEY}
      - CORS_ORIGINS=["http://localhost:3000","http://localhost:8080"]
      - LOG_LEVEL=${LOG_LEVEL:-DEBUG}
    volumes:
      - ./backend:/app
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - aigc-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:38000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: aigc-web
    restart: unless-stopped
    ports:
      - "3000:80"
    environment:
      - VITE_API_BASE_URL=${VITE_API_BASE_URL:-http://localhost:38000/api/v1}
      - VITE_WS_URL=${VITE_WS_URL:-ws://localhost:38000/ws}
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - api
    networks:
      - aigc-network

  db:
    image: postgres:15-alpine
    container_name: aigc-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=aigc
      - POSTGRES_PASSWORD=aigc
      - POSTGRES_DB=aigc_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - aigc-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aigc"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: aigc-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - aigc-network

volumes:
  postgres_data:
  redis_data:
  uploads:

networks:
  aigc-network:
    driver: bridge
