version: '3.8'

services:
  ops-hub-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ops-hub-frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8000
    networks:
      - ops-network
    depends_on:
      - ops-hub-backend

  ops-hub-backend:
    image: python:3.11-slim
    container_name: ops-hub-backend
    working_dir: /app
    command: sh -c "pip install fastapi uvicorn prometheus-client && python -m uvicorn main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    environment:
      - PROMETHEUS_URL=http://prometheus:9090
      - LOKI_URL=http://loki:3100
      - ALERTMANAGER_URL=http://alertmanager:9093
    networks:
      - ops-network
    volumes:
      - ./backend:/app

  prometheus:
    image: prom/prometheus:latest
    container_name: ops-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    networks:
      - ops-network
    volumes:
      - ../../ops/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../../ops/prometheus/alert_rules:/etc/prometheus/alert_rules:ro
      - prometheus-data:/prometheus
    restart: unless-stopped

  loki:
    image: grafana/loki:2.9.0
    container_name: ops-loki
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"
    networks:
      - ops-network
    volumes:
      - loki-data:/loki
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:latest
    container_name: ops-alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    ports:
      - "9093:9093"
    networks:
      - ops-network
    volumes:
      - ../../ops/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - ../../ops/alertmanager/templates:/etc/alertmanager/templates:ro
      - alertmanager-data:/alertmanager
    restart: unless-stopped

networks:
  ops-network:
    driver: bridge

volumes:
  prometheus-data:
  loki-data:
  alertmanager-data:
